<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AgentOS - AI Agent Platform</title>
    <meta
      name="description"
      content="Define tasks in natural language and watch an AI agent execute them autonomously through a perceive, plan, act loop."
    />
    <link
      rel="preload"
      as="image"
      href="/images/hero-bg-user-1536.avif"
      imagesrcset="/images/hero-bg-user-960.avif 960w, /images/hero-bg-user-1536.avif 1536w"
      imagesizes="100vw"
      type="image/avif"
      fetchpriority="high"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><polygon points='16,2 28,9 28,23 16,30 4,23 4,9' fill='%237C3AED'/></svg>"
    />
    <meta property="og:title" content="AgentOS - AI Agent Platform" />
    <meta
      property="og:description"
      content="Define tasks in natural language and watch an AI agent execute them autonomously."
    />
    <meta property="og:type" content="website" />
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #121520;
        font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .app-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #6679a6 0%, #3a334c 48%, #121520 100%);
      }

      .app-boot__panel {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        padding: 16px 20px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(9, 11, 18, 0.28);
        box-shadow: 0 24px 80px rgba(5, 8, 17, 0.3);
        backdrop-filter: blur(22px);
        color: rgba(255, 255, 255, 0.92);
      }

      .app-boot__logo {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        background: linear-gradient(135deg, #865dff, #5c7cff);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .app-boot__text {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot" aria-hidden="true">
        <div class="app-boot__panel">
          <div class="app-boot__logo"></div>
          <div class="app-boot__text">Launching AgentOS</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
