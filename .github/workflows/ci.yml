name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Lint frontend
        run: bun run lint

      - name: Run frontend tests
        run: bun run test

      - name: Build frontend
        run: bun run build

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.cloud.txt

      - name: Run backend tests
        run: python -m unittest discover -s backend/tests -v

      - name: Compile backend sources
        run: python -m compileall backend/app

      - name: Compile backend entrypoint
        run: python -m py_compile backend/run.py
